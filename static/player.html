<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PIXEL PLAYER</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

  :root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --bg3: #1a1a28;
    --accent: #00ff88;
    --accent2: #ff00aa;
    --accent3: #00aaff;
    --text: #e0e0e0;
    --muted: #555570;
    --border: #2a2a40;
    --pixel: 2px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Press Start 2P', monospace;
    min-height: 100vh;
    padding: 12px;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    overflow-x: hidden;
  }

  .pixel-box {
    background: var(--bg2);
    border: var(--pixel) solid var(--accent);
    box-shadow: 0 0 0 var(--pixel) var(--bg), 0 0 0 calc(var(--pixel)*2) var(--accent), 0 0 20px rgba(0,255,136,0.12);
    margin-bottom: 10px;
  }

  /* HEADER */
  .header { text-align: center; margin-bottom: 12px; padding-top: 4px; }
  .logo {
    font-size: 10px; color: var(--accent); letter-spacing: 3px;
    text-shadow: 0 0 10px var(--accent), 2px 2px 0 var(--accent2);
    animation: flicker 4s infinite;
  }
  .sub { font-family: 'VT323'; font-size: 13px; color: var(--muted); margin-top: 3px; letter-spacing: 2px; }
  @keyframes flicker { 0%,95%,100%{opacity:1} 96%{opacity:.6} 97%{opacity:1} 98%{opacity:.4} }

  /* API KEY */
  .api-section { padding: 12px; }
  .api-section label { font-size: 6px; color: var(--accent3); display: block; margin-bottom: 7px; letter-spacing: 1px; }
  .api-row { display: flex; gap: 7px; }
  .pixel-input {
    flex: 1; background: var(--bg3); border: var(--pixel) solid var(--border);
    color: var(--accent); font-family: 'VT323'; font-size: 15px;
    padding: 7px 9px; outline: none;
  }
  .pixel-input:focus { border-color: var(--accent); }
  .pixel-input::placeholder { color: var(--muted); }

  /* BUTTONS */
  .px-btn {
    font-family: 'Press Start 2P'; font-size: 6px; background: var(--bg3);
    color: var(--accent); border: var(--pixel) solid var(--accent);
    padding: 7px 10px; cursor: pointer; letter-spacing: 1px;
    box-shadow: 2px 2px 0 var(--accent); white-space: nowrap;
    transition: all .1s; touch-action: manipulation;
  }
  .px-btn:active { transform: translate(2px,2px); box-shadow: none; background: var(--accent); color: var(--bg); }
  .px-btn.accent2 { color: var(--accent2); border-color: var(--accent2); box-shadow: 2px 2px 0 var(--accent2); }
  .px-btn.accent2:active { background: var(--accent2); color: var(--bg); }

  /* SEARCH */
  .search-section { padding: 12px; }
  .search-section label { font-size: 6px; color: var(--accent2); display: block; margin-bottom: 7px; letter-spacing: 1px; }
  .search-row { display: flex; gap: 7px; }

  /* NOW PLAYING */
  .now-playing { padding: 12px; display: none; }
  .now-playing.visible { display: block; }
  .np-label { font-size: 6px; color: var(--accent); letter-spacing: 1px; margin-bottom: 10px; display: flex; align-items: center; gap: 7px; }
  .np-label::before { content:''; display:inline-block; width:7px; height:7px; background:var(--accent); animation: blink 1s infinite; }
  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }

  .np-info { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 12px; }
  .np-thumb { width: 72px; height: 54px; object-fit: cover; border: var(--pixel) solid var(--accent); box-shadow: 2px 2px 0 var(--accent2); flex-shrink: 0; }
  .np-meta { flex: 1; overflow: hidden; }
  .np-title { font-family: 'VT323'; font-size: 17px; color: var(--accent); line-height: 1.3; margin-bottom: 3px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .np-channel { font-family: 'VT323'; font-size: 13px; color: var(--muted); }

  /* VISUALIZER */
  .visualizer { height: 36px; display: flex; align-items: flex-end; gap: 2px; padding: 0 3px; margin-bottom: 10px; }
  .vbar { flex:1; background:var(--accent); min-height:3px; transition:height .1s; opacity:.7; box-shadow:0 0 4px var(--accent); }
  .vbar:nth-child(even) { background:var(--accent2); box-shadow:0 0 4px var(--accent2); }
  .vbar:nth-child(3n) { background:var(--accent3); box-shadow:0 0 4px var(--accent3); }

  /* PROGRESS */
  .progress-wrap { margin-bottom: 10px; }
  .time-row { display:flex; justify-content:space-between; font-family:'VT323'; font-size:13px; color:var(--muted); margin-bottom:5px; }
  .progress-track { width:100%; height:10px; background:var(--bg3); border:var(--pixel) solid var(--border); cursor:pointer; position:relative; }
  .progress-fill { height:100%; background:var(--accent); width:0%; position:relative; transition:width .5s linear; box-shadow:0 0 5px var(--accent); }
  .progress-fill::after { content:''; position:absolute; right:-3px; top:0; width:6px; height:100%; background:#fff; }

  /* CONTROLS */
  .controls { display:flex; align-items:center; gap:7px; margin-bottom: 10px; }
  .ctrl-btn { font-family:'Press Start 2P'; font-size:9px; background:var(--bg3); color:var(--text); border:var(--pixel) solid var(--border); width:34px; height:34px; cursor:pointer; display:flex; align-items:center; justify-content:center; touch-action:manipulation; }
  .ctrl-btn:active { border-color:var(--accent); color:var(--accent); }
  .ctrl-btn.play-btn { width:42px; height:42px; border-color:var(--accent); color:var(--accent); font-size:12px; box-shadow:2px 2px 0 var(--accent); }
  .ctrl-btn.play-btn:active { background:var(--accent); color:var(--bg); }
  .vol-row { display:flex; align-items:center; gap:5px; flex:1; }
  .vol-icon { font-family:'Press Start 2P'; font-size:7px; color:var(--muted); flex-shrink:0; }
  input[type=range].vol-slider { flex:1; -webkit-appearance:none; height:7px; background:var(--bg3); border:var(--pixel) solid var(--border); outline:none; cursor:pointer; }
  input[type=range].vol-slider::-webkit-slider-thumb { -webkit-appearance:none; width:11px; height:15px; background:var(--accent); border:none; cursor:pointer; }

  /* RESULTS */
  .results-section { padding: 12px; display: none; }
  .results-section.visible { display: block; }
  .results-label { font-size: 6px; color: var(--accent3); letter-spacing: 1px; margin-bottom: 9px; }
  .results-list { display:flex; flex-direction:column; gap:5px; max-height: 260px; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--accent) var(--bg3); }
  .result-item { display:flex; gap:9px; padding:7px; background:var(--bg3); border:var(--pixel) solid var(--border); cursor:pointer; align-items:center; touch-action:manipulation; }
  .result-item:active, .result-item.active { border-color:var(--accent2); background:rgba(255,0,170,.06); }
  .result-thumb { width:56px; height:42px; object-fit:cover; flex-shrink:0; border:1px solid var(--border); }
  .result-info { flex:1; overflow:hidden; }
  .result-title { font-family:'VT323'; font-size:14px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
  .result-channel { font-family:'VT323'; font-size:11px; color:var(--muted); }
  .result-num { font-size:7px; color:var(--muted); flex-shrink:0; padding:2px 5px; border:1px solid var(--border); }

  /* STATUS */
  .status-bar { display:flex; justify-content:space-between; align-items:center; padding:5px 10px; background:var(--bg3); border:var(--pixel) solid var(--border); margin-top:8px; }
  .status-text { font-family:'VT323'; font-size:12px; color:var(--muted); }
  .status-dot { width:7px; height:7px; background:var(--muted); flex-shrink:0; }
  .status-dot.on { background:var(--accent); box-shadow:0 0 5px var(--accent); animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  #yt-frame { display:none; }
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:var(--bg3); }
  ::-webkit-scrollbar-thumb { background:var(--accent); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">◆ PIXEL PLAYER ◆</div>
  <div class="sub">&gt; YOUTUBE EDITION &lt;</div>
</div>

<div class="pixel-box api-section">
  <label>▸ YOUTUBE API KEY</label>
  <div class="api-row">
    <input class="pixel-input" type="password" id="api-key" placeholder="AIza...">
    <button class="px-btn" onclick="saveKey()">SAVE</button>
  </div>
</div>

<div class="pixel-box search-section">
  <label>▸ SEARCH TRACKS</label>
  <div class="search-row">
    <input class="pixel-input" type="text" id="search-q" placeholder="artist / track...">
    <button class="px-btn accent2" onclick="doSearch()">FIND</button>
  </div>
</div>

<div class="pixel-box now-playing" id="now-playing">
  <div class="np-label">NOW PLAYING</div>
  <div class="np-info">
    <img class="np-thumb" id="np-thumb" src="" alt="">
    <div class="np-meta">
      <div class="np-title" id="np-title">—</div>
      <div class="np-channel" id="np-channel">—</div>
    </div>
  </div>
  <div class="visualizer" id="viz"></div>
  <div class="progress-wrap">
    <div class="time-row">
      <span id="cur-time">0:00</span>
      <span id="dur-time">0:00</span>
    </div>
    <div class="progress-track" id="prog-track" onclick="seek(event)">
      <div class="progress-fill" id="prog-fill"></div>
    </div>
  </div>
  <div class="controls">
    <button class="ctrl-btn" onclick="prevTrack()">◀◀</button>
    <button class="ctrl-btn play-btn" id="play-btn" onclick="togglePlay()">▶</button>
    <button class="ctrl-btn" onclick="nextTrack()">▶▶</button>
    <div class="vol-row">
      <span class="vol-icon">♪</span>
      <input type="range" class="vol-slider" id="vol" min="0" max="100" value="80" oninput="setVol(this.value)">
    </div>
  </div>
</div>

<div class="pixel-box results-section" id="results-section">
  <div class="results-label">▸ RESULTS</div>
  <div class="results-list" id="results-list"></div>
</div>

<div class="status-bar">
  <span class="status-text" id="status-text">READY &gt; ENTER API KEY &amp; SEARCH</span>
  <div class="status-dot" id="status-dot"></div>
</div>

<iframe id="yt-frame" width="1" height="1" allow="autoplay" src="about:blank"></iframe>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
// Telegram Web App init
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0a0a0f');
  tg.setBackgroundColor('#0a0a0f');
}

// STATE
let apiKey = localStorage.getItem('yt_api_key') || '';
let player = null;
let ytReady = false;
let tracks = [];
let currentIdx = -1;
let isPlaying = false;
let progressInterval = null;
let vizInterval = null;
let vizBars = [];

if (apiKey) {
  document.getElementById('api-key').value = apiKey;
  setStatus('API KEY LOADED. READY TO SEARCH.');
}

// Visualizer bars
const viz = document.getElementById('viz');
for (let i = 0; i < 20; i++) {
  const b = document.createElement('div');
  b.className = 'vbar';
  b.style.height = '3px';
  viz.appendChild(b);
  vizBars.push(b);
}

// Enter key
document.getElementById('search-q').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });
document.getElementById('api-key').addEventListener('keydown', e => { if(e.key==='Enter') saveKey(); });

function saveKey() {
  apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey) { setStatus('ERROR: NO API KEY ENTERED'); return; }
  localStorage.setItem('yt_api_key', apiKey);
  setStatus('API KEY SAVED. READY TO SEARCH.');
}

async function doSearch() {
  if (!apiKey) { setStatus('ERROR: SET API KEY FIRST'); return; }
  const q = document.getElementById('search-q').value.trim();
  if (!q) { setStatus('ERROR: ENTER SEARCH QUERY'); return; }
  setStatus('SEARCHING...');
  document.getElementById('status-dot').classList.add('on');
  try {
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&type=video&videoCategoryId=10&maxResults=15&key=${apiKey}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) { setStatus('API ERROR: ' + (data.error.message||'').substring(0,35)); document.getElementById('status-dot').classList.remove('on'); return; }
    tracks = (data.items||[]).map(item => ({
      id: item.id.videoId,
      title: item.snippet.title,
      channel: item.snippet.channelTitle,
      thumb: item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url || ''
    }));
    renderResults();
    setStatus(`FOUND ${tracks.length} TRACKS`);
    document.getElementById('status-dot').classList.remove('on');
  } catch(e) {
    setStatus('NETWORK ERROR');
    document.getElementById('status-dot').classList.remove('on');
  }
}

function renderResults() {
  const section = document.getElementById('results-section');
  const list = document.getElementById('results-list');
  section.classList.add('visible');
  list.innerHTML = '';
  tracks.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'result-item' + (i===currentIdx?' active':'');
    el.innerHTML = `
      <span class="result-num">${String(i+1).padStart(2,'0')}</span>
      <img class="result-thumb" src="${t.thumb}" onerror="this.style.display='none'" alt="">
      <div class="result-info">
        <div class="result-title">${escHtml(t.title)}</div>
        <div class="result-channel">${escHtml(t.channel)}</div>
      </div>`;
    el.onclick = () => playTrack(i);
    list.appendChild(el);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function onYouTubeIframeAPIReady() {
  ytReady = true;
  player = new YT.Player('yt-frame', {
    height:'1', width:'1',
    playerVars: { autoplay:0, controls:0 },
    events: {
      onStateChange: onPlayerState,
      onReady: () => { setVol(document.getElementById('vol').value); }
    }
  });
}

function onPlayerState(e) {
  if (e.data===1) {
    isPlaying=true;
    document.getElementById('play-btn').textContent='▐▐';
    startProgress(); startViz();
    document.getElementById('status-dot').classList.add('on');
  } else if (e.data===2) {
    isPlaying=false;
    document.getElementById('play-btn').textContent='▶';
    stopProgress(); stopViz();
    document.getElementById('status-dot').classList.remove('on');
  } else if (e.data===0) {
    nextTrack();
  }
}

function playTrack(idx) {
  if (idx<0||idx>=tracks.length) return;
  currentIdx=idx;
  const t=tracks[idx];
  document.getElementById('now-playing').classList.add('visible');
  document.getElementById('np-title').textContent=t.title;
  document.getElementById('np-channel').textContent=t.channel;
  document.getElementById('np-thumb').src=t.thumb;
  document.querySelectorAll('.result-item').forEach((el,i)=>el.classList.toggle('active',i===idx));
  setStatus('LOADING: '+t.title.substring(0,28)+'...');
  if (!ytReady||!player) { setStatus('PLAYER NOT READY YET'); return; }
  player.loadVideoById(t.id);
}

function togglePlay() { if(!player) return; isPlaying?player.pauseVideo():player.playVideo(); }
function prevTrack() { playTrack(currentIdx>0?currentIdx-1:tracks.length-1); }
function nextTrack() { playTrack(currentIdx<tracks.length-1?currentIdx+1:0); }
function setVol(v) { if(player) player.setVolume(Number(v)); }

function seek(e) {
  if(!player) return;
  const rect=e.currentTarget.getBoundingClientRect();
  const ratio=(e.clientX-rect.left)/rect.width;
  player.seekTo(ratio*(player.getDuration()||0),true);
}

function startProgress() { stopProgress(); progressInterval=setInterval(updateProgress,500); }
function stopProgress() { if(progressInterval) clearInterval(progressInterval); }
function updateProgress() {
  if(!player) return;
  const cur=player.getCurrentTime()||0, dur=player.getDuration()||0;
  document.getElementById('prog-fill').style.width=(dur>0?cur/dur*100:0)+'%';
  document.getElementById('cur-time').textContent=fmtTime(cur);
  document.getElementById('dur-time').textContent=fmtTime(dur);
}
function fmtTime(s) { s=Math.floor(s); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }

function startViz() {
  stopViz();
  vizInterval=setInterval(()=>{ vizBars.forEach(b=>{ b.style.height=(3+Math.random()*33)+'px'; }); },130);
}
function stopViz() { if(vizInterval) clearInterval(vizInterval); vizBars.forEach(b=>b.style.height='3px'); }
function setStatus(msg) { document.getElementById('status-text').textContent=msg.toUpperCase().substring(0,48); }
</script>
</body>
</html>
